name: CI/CD Pipeline - Build and Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t cicd-docker-demo:latest .

      - name: Verify image was created
        run: docker images cicd-docker-demo

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-container cicd-docker-demo:latest
          sleep 5
          docker ps
          docker logs test-container
          docker stop test-container

      - name: Pipeline complete
        run: echo "Success! Docker image built and container ran."